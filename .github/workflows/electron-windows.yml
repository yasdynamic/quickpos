name: Windows installer (Electron V2)

# This workflow is a stub for the V2 Electron build. It will build a Windows
# installer once the backend has been ported to TypeScript + Prisma + SQLite
# and the Electron wrapper is added at /electron.
#
# Triggers:
#   - Manually from the Actions tab (workflow_dispatch)
#   - On semver tag push: v1.0.0, v2.1.3, ...

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Notes de version"
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: Build .exe installer
    runs-on: windows-latest
    if: ${{ hashFiles('electron/package.json') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (React)
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build
        env:
          REACT_APP_BACKEND_URL: "http://localhost:8001"
          CI: "false"

      - name: Build Electron app
        working-directory: electron
        run: |
          yarn install --frozen-lockfile
          yarn build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: warya-windows-installer
          path: |
            electron/dist/*.exe
            electron/dist/*.exe.blockmap
            electron/dist/latest.yml
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron/dist/*.exe
            electron/dist/latest.yml
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false

  notify-stub:
    name: Stub notice (no electron/ yet)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('electron/package.json') == '' }}
    steps:
      - run: |
          echo "::warning::Le dossier electron/ n'existe pas encore."
          echo "::warning::Migration V2 (TypeScript + Prisma + SQLite + Electron) requise avant build."
          echo "::warning::Voir docs/V2-MIGRATION.md (à venir) pour le plan détaillé."
