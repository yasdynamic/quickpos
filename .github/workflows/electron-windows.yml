name: Windows installer (Electron)

# Builds the WARYA Windows installer (.exe) using electron-builder and
# attaches it to a GitHub Release.
#
# Triggers:
#   - Manually from the Actions tab (workflow_dispatch) — produces an artifact
#   - On semver tag push: v1.0.0, v2.1.3, ... — also publishes a GitHub Release
#
# Code signing (recommended to avoid Windows SmartScreen warnings):
#   Add the following repository SECRETS:
#     WIN_CSC_LINK              base64-encoded .pfx certificate file
#     WIN_CSC_KEY_PASSWORD      certificate password
#   When both are present, electron-builder signs the installer automatically.
#   When absent, the build still succeeds but the .exe is unsigned (users see
#   a "Windows protected your PC" prompt on first launch).
#
# Custom target URL:
#   By default the wrapper loads the URL set in electron/src/config.js.
#   You can override per-build by passing `warya_url` to the manual dispatch.

on:
  workflow_dispatch:
    inputs:
      warya_url:
        description: "URL WARYA cible (laisser vide pour utiliser config.js)"
        required: false
        default: ""
      release_notes:
        description: "Notes de version (optionnel)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build .exe installer
    runs-on: windows-latest
    permissions:
      contents: write   # required by softprops/action-gh-release to create Releases
    env:
      WIN_CSC_LINK_B64: ${{ secrets.WIN_CSC_LINK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Electron dependencies
        working-directory: electron
        run: |
          if (Test-Path yarn.lock) {
            yarn install --frozen-lockfile
          } else {
            Write-Host "WARNING: yarn.lock missing — running fresh install"
            yarn install
          }
        shell: pwsh

      - name: Decode signing certificate (if provided)
        if: ${{ env.WIN_CSC_LINK_B64 != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\warya-cert.pfx", [Convert]::FromBase64String($env:WIN_CSC_LINK_B64))
          echo "WIN_CSC_LINK=$env:RUNNER_TEMP\warya-cert.pfx" >> $env:GITHUB_ENV

      - name: Build Windows installer
        working-directory: electron
        shell: pwsh
        env:
          WARYA_URL: ${{ github.event.inputs.warya_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (set only if certificate provided)
          CSC_LINK: ${{ env.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: yarn build:win

      - name: List build output
        working-directory: electron/dist
        shell: pwsh
        run: Get-ChildItem -Recurse | Select-Object FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: warya-windows-installer
          path: |
            electron/dist/WARYA-Setup-*.exe
            electron/dist/WARYA-*-portable.exe
            electron/dist/*.exe.blockmap
            electron/dist/latest.yml
          if-no-files-found: error

      - name: Detect pre-release
        id: prerelease
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match "alpha|beta|rc|pre") {
            echo "is_prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "is_prerelease=false" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "WARYA ${{ github.ref_name }}"
          files: |
            electron/dist/WARYA-Setup-*.exe
            electron/dist/WARYA-*-portable.exe
            electron/dist/latest.yml
          body: |
            ## WARYA ${{ github.ref_name }} — Windows installer

            Téléchargez l'un des deux fichiers ci-dessous :

            - **`WARYA-Setup-*.exe`** — installateur classique NSIS (choix du dossier, raccourcis bureau + menu Démarrer, désinstallation propre)
            - **`WARYA-*-portable.exe`** — version portable, aucune installation requise (lance directement)

            ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
