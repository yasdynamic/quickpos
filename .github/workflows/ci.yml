name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . || true   # warning-only for now

      - name: Run unit tests
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: warya_ci
          LICENSE_SALT: ci-test-salt
          LICENSE_AES_KEY: ci-test-aes-key
        run: |
          if [ -d tests ]; then pytest tests/ -q; else echo "No tests/ directory yet"; fi

      - name: Verify license module
        working-directory: backend
        env:
          LICENSE_SALT: ci-test-salt
          LICENSE_AES_KEY: ci-test-aes-key
        run: |
          python -c "from licensing import compute_fingerprint, build_license; print('FP:', compute_fingerprint())"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: yarn eslint src --max-warnings=999 || true   # warning-only for now

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://example.com
          CI: "false"   # ignore warnings during CI build
        run: yarn build
